<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>ToDo App</title>
        <style>
            body {
               font-family: "Verdana", Geneva, sans-serif;
               margin: 0;
               padding: 20px;
               max-width: 900px;
               margin: 0 auto;
               background-color: #302e2f;
            }

            #app-title {
                text-align: center;
                margin-bottom: 20px;
                color: #00F0FF;
            }

            #app-container {
                display: grid;
                grid-template-columns: 300px 1fr;
                grid-template-rows: auto auto;
                gap: 20px;
            }

            #projects {
                display: flex;
                flex-direction: column;
                gap: 10px;
                align-self: start;
                border: 2px solid #00F0FF;
                padding: 10px;
               
            }

            #todos-section {
                border: 2px solid #00F0FF;
                padding: 10px;
            }

            #calendar {
                grid-column: 1 / 3;
                border: 2px solid #00F0FF;
                padding: 10px;
            }

            #projects, 
            #todos-section,
            #calendar {
                border-radius: 8px;
                background-color: #FFFFFF50;
                
            }

            h2 {
                margin-top: 0;
                color: #ff5de9;
                margin-left: 10px;
            }
            
            button {
                margin: 5px 10px;
                padding: 6px 8px;
                cursor: pointer;
                background-color: #069494;
                color: white;
                font-weight: bold;
                border-radius: 6px;
                border: 1px solid white;
                font-size: 14px;
            }
       
            #projects span {
                font-family: "Verdana", Geneva, sans-serif;
                font-size: 20px;
                text-align: center;
                font-weight: bold;
                padding: 5px;
                color: #069494;

            }

            .todo-title {
                font-family: "Arial", Helvetica, sans-serif;
                font-weight: bold;
                align-items: center;
                justify-content: center;
                font-size: 16px;
                display: inline-block;
                margin-bottom: 6px;
            }

            .todo-description {
                font-family: "Georgia", serif;
                font-size: 14px;
                margin-top: 6px;
                color: #333;
                line-height: 1.4;
                background: rgba(255,255,255,0.5);
                padding: 4px;
                border-radius: 4px;
            }

            #projects-list > div {
                cursor: pointer;
                border: 1px solid #ccc;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 6px 8px;
                margin-bottom: 4px;
                border-radius: 6px;
                background-color: #f9f9f9;
                transition: background-color 0.2s ease;
                gap: 8px;
            }

            #projects-list > div:hover {
                background-color: #e6f2ff;
            }

            #projects-list > div.active {
                background-color: #cce0ff;
                font-weight: bold;
            }

            #projects-list > div > span {
                cursor: pointer;
                flex-grow: 1;
                flex: 1;
                min-width: 0;
                word-break: break-word;
            }

            #projects-list > div > button {
                margin-left: 8px;
                margin-top: 0;
                padding: 2px 6px;
                font-size: 12px;
                border: none;
                border-radius: 4px;
                background-color: #ff6b6b;
                color: white;
                cursor: pointer;
                flex-shrink: 0;
                width: 80px;
                text-align: center;
                transition: background-color 0.2s ease;
            }

            #projects-list > div > button:hover {
                background-color: #e04848;
            }

            #todo-form {
                display: flex;
                flex-direction: column;
                gap: 6px;
                margin-bottom: 10px;
            }

            #todo-form input,
            #todo-form select {
                padding: 5px;
            }

            #todo-form button {
                align-self: flex-start;
            }

            .completed {
                opacity: 0.6;
            }

            .completed strong {
                text-decoration: line-through;
            }

            .completed .todo-description {
                text-decoration: line-through;
            }

            #todos > div {
                transition: all 0.2s ease;
                padding: 10px;
                margin-bottom: 10px;
                border-bottom: 1px solid rgba(0,0,0,0.1);
            }

            .todo-meta {
                font-size: 14px;
                color: #555;
                margin-bottom: 4px;
            }

            #add-project {
                width: 100%;
                padding: 6px;
                margin-top: 5px;
                cursor: pointer;
            }

            #project-form {
                text-align: center;
            }
          
        </style>
    </head>
    <body>
        <h1 id="app-title">ToDo App</h1>

        <div id="app-container">
            <div id="projects">
                <h2>Projects</h2>

                <div id="projects-list"></div>

                <form id="project-form">
                    <input
                        type="text"
                        id="project-name"
                        placeholder="New Project..."
                        required 
                    />
                    <button type="submit" id="add-btn">Add</button>
                </form>

            </div>
            
            <div id="todos-section">
                <h2>ToDos</h2>

                <form id="todo-form">
                    <input type="text" id="title" placeholder="Title" required />

                    <input type="text" id="description" placeholder="Description" />

                    <input type="date" id="dueDate" />

                    <select id="priority">
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>

                    <button type="submit">Add ToDo</button>
                </form>

                <div id="todos"></div> 
            </div>

            <div id="calendar">
                <h2>Upcoming Due Dates</h2>
            </div>
        </div>
        
       

        <script src="main.js"></script>
    </body>
</html>
